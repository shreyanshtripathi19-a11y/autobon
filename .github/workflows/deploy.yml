name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend & Backend to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | tail -1)/bin:$PATH:/usr/local/bin:/usr/bin"

            # ─── Pull Latest Code ────────────────────────────────
            APP_DIR="/var/www/autobon"

            if [ ! -d "$APP_DIR" ]; then
              echo ">>> Cloning repository..."
              git clone https://github.com/shreyanshtripathi19-a11y/autobon.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo ">>> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ─── Frontend ────────────────────────────────────────
            echo ">>> Installing frontend dependencies..."
            npm install --legacy-peer-deps

            echo ">>> Building frontend..."
            npm run build

            echo ">>> Restarting frontend with PM2..."
            if pm2 describe autobon > /dev/null 2>&1; then
              pm2 restart autobon
            else
              pm2 start npm --name "autobon" -- start
            fi

            # ─── Backend (from same repo) ────────────────────────
            BACKEND_DIR="/var/www/autobon-backend"

            echo ">>> Syncing backend from repo..."
            rsync -av --delete \
              --exclude 'node_modules' \
              --exclude '.env' \
              "$APP_DIR/backend/" "$BACKEND_DIR/"

            cd "$BACKEND_DIR"

            echo ">>> Installing backend dependencies..."
            npm install

            echo ">>> Running Prisma schema sync..."
            npx prisma generate
            npx prisma db push --accept-data-loss || true

            echo ">>> Restarting backend with PM2..."
            if pm2 describe autobon-backend > /dev/null 2>&1; then
              pm2 restart autobon-backend
            else
              pm2 start src/index.js --name "autobon-backend"
            fi

            pm2 save

            echo ">>> Deployment complete!"
