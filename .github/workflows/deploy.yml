name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | tail -1)/bin:$PATH:/usr/local/bin:/usr/bin"

            APP_DIR="/var/www/autobon"

            # Clone if not exists, otherwise pull
            if [ ! -d "$APP_DIR" ]; then
              echo ">>> Cloning repository..."
              git clone https://github.com/shreyanshtripathi19-a11y/autobon.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo ">>> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Installing dependencies..."
            npm install --legacy-peer-deps

            echo ">>> Building application..."
            npm run build

            echo ">>> Restarting application with PM2..."
            if pm2 describe autobon > /dev/null 2>&1; then
              pm2 restart autobon
            else
              pm2 start npm --name "autobon" -- start
            fi

            pm2 save

            echo ">>> Deployment complete!"
